# External Sources
#
# Cross-repo resource locations for this project.
# Paths reference environment variables from the operator's
# ~/.claude/settings.json.
#
# Required environment variables:
#   EPUBLISHER_DEV_PATH  — ePublisher development trunk
#   EPUBLISHER_DOCS_PATH — ePublisher documentation project

# Parser implementation (authoritative parsing rules)
MDPP_PARSER_ROOT="${EPUBLISHER_DEV_PATH}/files/webworks/Adapters/helper/markdown"
MDPP_PARSER_ENTRY="driver.py"

# Legacy authoring documentation (existing user-facing syntax docs)
MDPP_LEGACY_DOCS_ROOT="${EPUBLISHER_DOCS_PATH}/legacy/authoring-source-documents/markdown"
MDPP_LEGACY_DOCS_ENTRY="_markdown.md"