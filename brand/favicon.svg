<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Markdown++ Favicon — Hashmark Monogram (optimized for 16-32px display) -->
  <!-- Heavier strokes and tighter geometry for clarity at tiny sizes -->
  <g fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linecap="butt">
    <!-- Plus 1 (upper-left, center at 35,35) -->
    <line x1="35" y1="15" x2="35" y2="55"/>
    <line x1="15" y1="35" x2="55" y2="35"/>
    <!-- Plus 2 (lower-right, center at 65,65) -->
    <line x1="65" y1="45" x2="65" y2="85"/>
    <line x1="45" y1="65" x2="85" y2="65"/>
  </g>
</svg>
