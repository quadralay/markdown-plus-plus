<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Markdown++ Logo — Hashmark Monogram (monochrome variant) -->
  <!-- Pure black strokes for print and high-contrast contexts -->
  <g fill="none" stroke="#000000" stroke-width="12" stroke-linecap="butt">
    <!-- Plus 1 (upper-left, center at 35,35) -->
    <line x1="35" y1="13" x2="35" y2="57"/>
    <line x1="13" y1="35" x2="57" y2="35"/>
    <!-- Plus 2 (lower-right, center at 65,65) -->
    <line x1="65" y1="43" x2="65" y2="87"/>
    <line x1="43" y1="65" x2="87" y2="65"/>
  </g>
</svg>
