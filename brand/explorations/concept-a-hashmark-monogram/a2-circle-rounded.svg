<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Hashmark Monogram — Variation 2: Medium weight, circle container, rounded terminals -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <g fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round">
    <!-- Plus 1 (upper-left, center at 35,35) -->
    <line x1="35" y1="15" x2="35" y2="57"/>
    <line x1="15" y1="35" x2="57" y2="35"/>
    <!-- Plus 2 (lower-right, center at 65,65) -->
    <line x1="65" y1="43" x2="65" y2="85"/>
    <line x1="43" y1="65" x2="85" y2="65"/>
  </g>
</svg>
