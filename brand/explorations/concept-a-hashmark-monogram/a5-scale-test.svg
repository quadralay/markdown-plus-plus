<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140">
  <!-- Hashmark Monogram — Variation 5: Scale test at deployment-realistic sizes -->
  <!-- Shows the heavy-weight variant at 128px, 64px, 32px, and 16px equivalent sizes -->

  <!-- 128px equivalent (scale 1.0) -->
  <g transform="translate(10,10) scale(1.0)">
    <g fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="butt">
      <line x1="35" y1="13" x2="35" y2="57"/>
      <line x1="13" y1="35" x2="57" y2="35"/>
      <line x1="65" y1="43" x2="65" y2="87"/>
      <line x1="43" y1="65" x2="87" y2="65"/>
    </g>
  </g>

  <!-- 64px equivalent (scale 0.64) -->
  <g transform="translate(130,28) scale(0.64)">
    <g fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="butt">
      <line x1="35" y1="13" x2="35" y2="57"/>
      <line x1="13" y1="35" x2="57" y2="35"/>
      <line x1="65" y1="43" x2="65" y2="87"/>
      <line x1="43" y1="65" x2="87" y2="65"/>
    </g>
  </g>

  <!-- 32px equivalent (scale 0.32) -->
  <g transform="translate(220,44) scale(0.32)">
    <g fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="butt">
      <line x1="35" y1="13" x2="35" y2="57"/>
      <line x1="13" y1="35" x2="57" y2="35"/>
      <line x1="65" y1="43" x2="65" y2="87"/>
      <line x1="43" y1="65" x2="87" y2="65"/>
    </g>
  </g>

  <!-- 16px equivalent (scale 0.16) -->
  <g transform="translate(270,52) scale(0.16)">
    <g fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linecap="butt">
      <line x1="35" y1="13" x2="35" y2="57"/>
      <line x1="13" y1="35" x2="57" y2="35"/>
      <line x1="65" y1="43" x2="65" y2="87"/>
      <line x1="43" y1="65" x2="87" y2="65"/>
    </g>
  </g>

  <!-- Size labels -->
  <text x="60" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">128px</text>
  <text x="162" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">64px</text>
  <text x="236" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">32px</text>
  <text x="278" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">16px</text>
</svg>
